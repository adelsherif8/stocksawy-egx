# Render Blueprint for the Stocksawy backend (FastAPI).
# Render: New + → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: stocksawy-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Required — this app calls OpenAI for analysis (no mock mode).
      - key: OPENAI_API_KEY
        sync: false
      # Optional integrations
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      # Set to your deployed frontend URL for CORS
      - key: ALLOWED_ORIGINS
        sync: false
