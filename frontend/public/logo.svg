<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e87a"/>
      <stop offset="100%" style="stop-color:#00b35c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="36" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Pyramid (Egypt symbol) — centered, mid section -->
  <g filter="url(#softglow)" opacity="0.18">
    <polygon points="200,90 310,210 90,210" fill="url(#gold)"/>
  </g>
  <polygon points="200,95 305,208 95,208" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- Candlestick chart — main visual -->
  <!-- Candle 1 (bearish, red) -->
  <g filter="url(#glow)">
    <line x1="108" y1="168" x2="108" y2="240" stroke="#ff4d6d" stroke-width="2" opacity="0.7"/>
    <rect x="100" y="185" width="16" height="38" rx="2" fill="#ff4d6d" opacity="0.85"/>
  </g>

  <!-- Candle 2 (bullish, green) -->
  <g filter="url(#glow)">
    <line x1="148" y1="155" x2="148" y2="235" stroke="url(#green)" stroke-width="2" opacity="0.8"/>
    <rect x="140" y="170" width="16" height="42" rx="2" fill="url(#green)" opacity="0.9"/>
  </g>

  <!-- Candle 3 (bearish small) -->
  <g filter="url(#glow)">
    <line x1="188" y1="148" x2="188" y2="218" stroke="#ff4d6d" stroke-width="2" opacity="0.6"/>
    <rect x="180" y="162" width="16" height="28" rx="2" fill="#ff4d6d" opacity="0.75"/>
  </g>

  <!-- Candle 4 (bullish tall) -->
  <g filter="url(#glow)">
    <line x1="228" y1="128" x2="228" y2="215" stroke="url(#green)" stroke-width="2" opacity="0.85"/>
    <rect x="220" y="143" width="16" height="52" rx="2" fill="url(#green)"/>
  </g>

  <!-- Candle 5 (bullish, tallest) -->
  <g filter="url(#glow)">
    <line x1="268" y1="115" x2="268" y2="210" stroke="url(#green)" stroke-width="2" opacity="0.9"/>
    <rect x="260" y="128" width="16" height="60" rx="2" fill="url(#green)"/>
  </g>

  <!-- Trend line -->
  <polyline points="108,204 148,191 188,176 228,169 268,158"
    fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="5,4" opacity="0.7"/>

  <!-- Arrow up at the end -->
  <g filter="url(#glow)" transform="translate(276, 130)">
    <polygon points="8,0 16,14 0,14" fill="url(#green)" opacity="0.95"/>
  </g>

  <!-- Bottom baseline -->
  <line x1="88" y1="240" x2="312" y2="240" stroke="#ffffff" stroke-width="1" opacity="0.1"/>

  <!-- Text: STOCKSAWY -->
  <text x="200" y="292"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="32" font-weight="900" letter-spacing="4"
    text-anchor="middle" fill="#ffffff">
    STOCK
  </text>
  <text x="200" y="292"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="32" font-weight="900" letter-spacing="4"
    text-anchor="middle" fill="url(#gold)" dx="88">SAWY</text>

  <!-- Workaround: just do it as one line with tspan -->
  <text x="200" y="292"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="32" font-weight="900" letter-spacing="3"
    text-anchor="middle" fill="none">
    <tspan fill="#ffffff">STOCK</tspan><tspan fill="url(#gold)">SAWY</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="320"
    font-family="Arial, sans-serif"
    font-size="11" letter-spacing="3"
    text-anchor="middle" fill="#ffffff" opacity="0.4">
    EGX INTELLIGENCE
  </text>

  <!-- Corner accent: EGX badge -->
  <rect x="20" y="20" width="46" height="22" rx="5" fill="url(#gold)" opacity="0.15"/>
  <rect x="20" y="20" width="46" height="22" rx="5" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <text x="43" y="35" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1"
    text-anchor="middle" fill="url(#gold)" opacity="0.9">EGX</text>
</svg>
